<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dodaj wydarzenie</title>

<link rel="stylesheet" href="style.css">

<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body>

<div id="loginView">

<h1>Dodawanie wydarzenia</h1>

<button id="loginBtn">Zaloguj z Google</button>

</div>

<div id="formView" class="hidden">

<h1>Nowe wydarzenie</h1>

<label>Nazwa wydarzenia</label> <input id="title" type="text">
<label>Lokalizacja</label>
<input id="location" type="text">

  <h2>Początek</h2>

<label>Dzień</label> <select id="day"></select>

<label>Miesiąc</label> <select id="month"></select>

<label>Godzina</label> <select id="hour"></select>

<label>Minuta</label> <select id="minute"></select>

<h2>Czas trwania</h2>

<label>Dni</label> <select id="durDays"></select>

<label>Godziny</label> <select id="durHours"></select>

<label>Minuty</label> <select id="durMinutes"></select>

<button id="addBtn">Dodaj wydarzenie</button>

</div>

<div id="dialog" class="hidden">

<p>Wydarzenie utworzone</p>

<button id="nextBtn">Dodaj kolejne</button>

</div>

<script src="add.js"></script>

</body>
</html>
