<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dodaj wydarzenie</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Dodaj wydarzenie</h1>

<div id="loginView">
<button id="loginBtn">Zaloguj w Google</button>
</div>

<div id="formView" class="hidden">

<label>Nazwa wydarzenia</label> <input id="title" type="text">

<label>Dzień</label> <select id="day"></select>

<label>Miesiąc</label> <select id="month"></select>

<label>Godzina</label> <select id="hour"></select>

<label>Minuty</label> <select id="minute"></select>

<button id="addBtn">Dodaj wydarzenie</button>

</div>

<div id="dialog" class="hidden">
<p>Wydarzenie utworzone.</p>
<button id="nextBtn">Dodaj kolejne</button>
</div>

<script src="add.js"></script>

</body>
</html>
